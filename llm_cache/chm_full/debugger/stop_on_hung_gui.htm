<h2><a id="ddk_stop_on_hung_gui_dtools"></a><a id="DDK_STOP_ON_HUNG_GUI_DTOOLS"></a></h2>

<p>shg</p>

</tr>

<p>0x8</p>
</td>
</tr>
<tr>
<td>
<p><b>Symbolic Name</b></p>
</td>
<td>
<p>FLG_STOP_ON_HUNG_GUI</p>
</td>
</tr>
<tr>
<td>
<p><b>Destination</b></p>
</td>
